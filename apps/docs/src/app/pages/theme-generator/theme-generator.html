<kj-theme-toolbar (requestImport)="openImport()" />

<div class="generator-body">
  <div class="generator-preview" data-theme="custom-draft">
    <kj-theme-generator-preview />
  </div>
  <aside class="generator-config" aria-label="Theme configuration">
    <kj-theme-config-panel />
  </aside>
</div>

@if (toast(); as msg) {
  <div class="generator-toast" role="status" aria-live="polite">{{ msg }}</div>
}

<kj-theme-import-dialog [open]="importOpen()" (closed)="onImportClosed($event)" />

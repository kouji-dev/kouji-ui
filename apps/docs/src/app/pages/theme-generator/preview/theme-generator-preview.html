<kj-tabs class="preview-tabs" [value]="active()" (valueChange)="setActive($event)">
  <kj-tab-list>
    @for (t of tabs; track t) {
      <kj-tab [value]="t">{{ labels[t] }}</kj-tab>
    }
  </kj-tab-list>

  <kj-tab-panel [value]="'dashboard'">
    <kj-preview-dashboard />
  </kj-tab-panel>
  <kj-tab-panel [value]="'settings'">
    <kj-preview-settings />
  </kj-tab-panel>
  <kj-tab-panel [value]="'big-form'">
    <kj-preview-big-form />
  </kj-tab-panel>
  <kj-tab-panel [value]="'search'">
    <kj-preview-search />
  </kj-tab-panel>
  <kj-tab-panel [value]="'chat'">
    <kj-preview-chat />
  </kj-tab-panel>
</kj-tabs>

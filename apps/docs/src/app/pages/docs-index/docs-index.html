<!-- Mobile top bar (TODO T9: wire mobile drawer) -->
<header class="mobile-topbar">
  <button
    class="hamburger"
    type="button"
    aria-label="Open navigation"
    aria-expanded="false"
  >
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <a routerLink="/docs" class="topbar-logo" aria-label="kouji home">
    <svg width="20" height="20" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="10" y1="10" x2="10" y2="54" stroke="#b8f500" stroke-width="6" stroke-linecap="round"/>
      <line x1="10" y1="32" x2="34" y2="10" stroke="#b8f500" stroke-width="6" stroke-linecap="round"/>
      <line x1="10" y1="32" x2="34" y2="54" stroke="#b8f500" stroke-width="6" stroke-linecap="round"/>
      <path d="M50 24 L50 48 Q50 56 42 56 Q38 56 36 54" stroke="#f0ede6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="50" cy="14" r="4" fill="#f0ede6"/>
    </svg>
    <span class="topbar-name">kouji</span>
  </a>
</header>

<!-- Backdrop (mobile only) -->
<div class="sidebar-backdrop" aria-hidden="true"></div>

<div class="docs-hero">
  <span class="tag">Documentation</span>
  <h1>kouji-ui ecosystem</h1>
  <p>The kouji-ui workspace ships {{ tracks().length }} consumable packages — pick a track to browse what's in each.</p>
</div>

<div class="track-grid">
  @for (track of tracks(); track track.id) {
    <kj-docs-track-card
      [eyebrow]="'@kouji-ui/' + track.packageName"
      [title]="track.title"
      [description]="track.tagline"
      [count]="itemCount(track)"
      cta="Browse all"
      [link]="['/docs', track.id]"
    />
  }
</div>

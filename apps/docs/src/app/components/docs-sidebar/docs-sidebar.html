<aside class="kj-docs-sidebar">
  <nav class="kj-docs-sidebar__nav" role="navigation" aria-label="Documentation sections">
    <!-- Search trigger — opens the global command palette mounted in app.ts -->
    <button
      type="button"
      class="kj-docs-sidebar__search"
      (click)="openSearch()"
      aria-label="Search documentation (Cmd K / Ctrl K)"
      aria-haspopup="dialog"
    >
      <span class="kj-docs-sidebar__search-glyph" aria-hidden="true">⌕</span>
      <span class="kj-docs-sidebar__search-text">search…</span>
      <kbd class="kj-docs-sidebar__kbd" aria-hidden="true">⌘K</kbd>
    </button>

    <!-- Quick link: Getting Started -->
    <div class="kj-docs-sidebar__quick">
      <a
        routerLink="/docs/getting-started"
        class="kj-docs-sidebar__quick-link"
        routerLinkActive="kj-docs-sidebar__quick-link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        [attr.aria-current]="gettingStartedActive() ? 'page' : null"
      >
        Getting Started
      </a>
    </div>

    <!-- Layered tray — one layer per track. Role=tree satisfies a11y contract;
         layer-head buttons are treeitems with aria-expanded; leaf links are
         treeitems too. -->
    <p
      id="kj-docs-sidebar-browse-heading"
      class="kj-docs-sidebar__browse-heading"
    >
      Browse by category
    </p>
    <div
      role="tree"
      aria-labelledby="kj-docs-sidebar-browse-heading"
      class="kj-docs-sidebar__tree"
    >
      @for (layer of layers(); track layer.id) {
        <div class="kj-docs-sidebar__layer">
          <button
            type="button"
            class="kj-docs-sidebar__layer-head"
            role="treeitem"
            aria-selected="false"
            [attr.aria-expanded]="isLayerOpen(layer.id)"
            [attr.aria-controls]="'kj-docs-layer-' + layer.id"
            [attr.id]="'kj-docs-layer-head-' + layer.id"
            (click)="toggleLayer(layer.id)"
          >
            <span class="kj-docs-sidebar__layer-mark" aria-hidden="true">{{ layer.mark }}</span>
            <span class="kj-docs-sidebar__layer-lbl">{{ layer.label }}</span>
            <span
              class="kj-docs-sidebar__layer-caret"
              [class.kj-docs-sidebar__layer-caret--open]="isLayerOpen(layer.id)"
              aria-hidden="true"
            >▾</span>
          </button>

          @if (isLayerOpen(layer.id)) {
            <div
              class="kj-docs-sidebar__layer-body"
              role="group"
              [attr.id]="'kj-docs-layer-' + layer.id"
              [attr.aria-labelledby]="'kj-docs-layer-head-' + layer.id"
            >
              @for (group of layer.groups; track group.label) {
                <div class="kj-docs-sidebar__nav-group">
                  <div class="kj-docs-sidebar__nav-label">{{ group.label }}</div>
                  @for (item of group.children; track item.label) {
                    @if (item.slug) {
                      <a
                        class="kj-docs-sidebar__nav-item"
                        role="treeitem"
                        [attr.aria-selected]="leafSelected(pageLink(layer.id, item.slug))"
                        [routerLink]="pageLink(layer.id, item.slug)"
                        routerLinkActive="kj-docs-sidebar__nav-item--active"
                        [routerLinkActiveOptions]="{ exact: true }"
                        ariaCurrentWhenActive="page"
                      >
                        <span class="kj-docs-sidebar__nav-name">{{ item.label }}</span>
                      </a>
                    }
                  }
                </div>
              }
            </div>
          }
        </div>
      }
    </div>
  </nav>
</aside>

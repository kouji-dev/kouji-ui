<aside class="kj-docs-sidebar">
  <nav class="kj-docs-sidebar__nav" role="navigation" aria-label="Documentation sections">
    <p class="kj-docs-sidebar__label">Docs</p>

    <div class="kj-docs-sidebar__quick">
      <a
        routerLink="/docs/getting-started"
        class="kj-docs-sidebar__quick-link"
        routerLinkActive="kj-docs-sidebar__quick-link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        [attr.aria-current]="gettingStartedActive() ? 'page' : null"
      >
        Getting Started
      </a>
    </div>

    <p id="kj-docs-sidebar-browse-heading" class="kj-docs-sidebar__browse-heading">
      Browse by category
    </p>
    <app-docs-nav-tree
      labelledBy="kj-docs-sidebar-browse-heading"
      [entries]="navTree()"
      [expandedIds]="expandedFolderIds()"
      (toggleFolder)="onToggleFolder($event)"
    />
  </nav>
</aside>

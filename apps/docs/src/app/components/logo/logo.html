<svg
  [attr.width]="size()"
  [attr.height]="size()"
  viewBox="0 0 64 64"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  [class.animate]="animate()"
  aria-label="kouji-ui logo"
  role="img"
>
  <!-- K letter: vertical stroke + two diagonals -->
  <g class="k-letter">
    <!-- Vertical bar of K -->
    <line class="k-stem" x1="10" y1="10" x2="10" y2="54" stroke="#b8f500" stroke-width="6" stroke-linecap="round"/>
    <!-- Upper diagonal of K -->
    <line class="k-upper" x1="10" y1="32" x2="34" y2="10" stroke="#b8f500" stroke-width="6" stroke-linecap="round"/>
    <!-- Lower diagonal of K -->
    <line class="k-lower" x1="10" y1="32" x2="34" y2="54" stroke="#b8f500" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- j letter: stem + dot -->
  <g class="j-letter">
    <!-- j stem: vertical line with curve at bottom -->
    <path
      class="j-stem"
      d="M50 24 L50 48 Q50 56 42 56 Q38 56 36 54"
      stroke="#f0ede6"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <!-- j dot: starts above, animates down -->
    <circle class="j-dot" cx="50" cy="14" r="4" fill="#f0ede6"/>
  </g>
</svg>

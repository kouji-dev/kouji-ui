<section class="scorecard" aria-label="Contrast scorecard">
  <div class="scorecard__badges" aria-live="polite">
    <kj-badge variant="default" size="sm">AAA {{ report().summary.score }}%</kj-badge>
    <kj-badge variant="secondary" size="sm">AA {{ report().summary.aaPass }}/{{ report().summary.total }}</kj-badge>
  </div>
  <ul role="list" class="rows">
    @for (p of report().pairs; track p.fg + ':' + p.bg) {
      <li
        role="listitem"
        class="row"
        [class.row--fail]="!p.pass"
        [attr.aria-label]="ariaForPair(p)"
        (click)="focusToken(p.bg)"
        (keydown.enter)="focusToken(p.bg)"
        tabindex="0"
      >
        <span class="chip" [style.background]="p.fgHex" aria-hidden="true"></span>
        <span class="chip" [style.background]="p.bgHex" aria-hidden="true"></span>
        <span class="row__label">{{ p.fg }} / {{ p.bg }}</span>
        <span class="row__ratio">{{ p.ratio.toFixed(2) }}:1</span>
        <span class="row__verdict">{{ p.pass ? '✓ ' + p.verdict : '✗ FAIL' }}</span>
      </li>
    }
  </ul>
</section>

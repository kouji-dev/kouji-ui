<kj-command-palette
  class="docs-search"
  [(kjOpen)]="svc.isOpen"
  [kjShouldFilter]="false"
  [kjQuery]="svc.query()"
  (kjQueryChange)="onQueryChange($event)"
  [kjItems]="svc.results()"
  kjHotkey="mod+k"
  kjAriaLabel="Search documentation"
  kjPlaceholder="Search components, directives, inputs..."
>
  <ng-template kjCommandPaletteItemTemplate let-result>
    <kj-command-item
      [kjValue]="result.slug + ':' + result.matchLabel"
      (click)="onResultClick(result)"
    >
      <div class="result-main">
        <span class="result-label">{{ result.matchLabel }}</span>
        <span class="result-type result-type-{{ result.matchType }}">{{ result.matchType }}</span>
      </div>
      <span class="result-path">{{ result.categoryPath.join(' / ') }}</span>
    </kj-command-item>
  </ng-template>
</kj-command-palette>

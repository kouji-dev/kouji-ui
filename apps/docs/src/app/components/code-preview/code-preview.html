<div class="preview-wrap">
  @if (examples().length) {
    <div class="preview-toolbar">
      <div class="file-tabs">
        @for (ex of examples(); track ex.filename; let i = $index) {
          <button
            class="file-tab"
            [class.active]="i === activeIndex()"
            (click)="setActive(i)"
            type="button"
          >
            {{ ex.filename }}
          </button>
        }
      </div>
      <button class="stackblitz-btn" (click)="openInStackBlitz()" type="button" title="Open in StackBlitz">
        <svg width="14" height="14" viewBox="0 0 28 28" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M12.747 16.273h-7.46L18.925 1.5l-3.671 10.227h7.46L9.075 26.5z"/>
        </svg>
        Open in StackBlitz
      </button>
    </div>

    @if (activeExample(); as ex) {
      <kj-code-editor [code]="ex.content" [lang]="ex.lang" />
    }
  } @else {
    <div class="no-examples">No examples available.</div>
  }
</div>

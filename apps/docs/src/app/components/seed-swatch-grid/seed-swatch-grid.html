<div
  class="seed-grid"
  [class.seed-grid--palette]="layout() === 'palette'"
  [class.seed-grid--strip]="layout() === 'strip'"
>
  <div class="hue-matrix" role="group" aria-label="Preset colors by hue row, lighter on the left">
    @for (col of columns(); track col.hueFamily) {
      <div class="hue-row" [attr.data-family]="col.hueFamily">
        <p class="hue-row__label">{{ familyLabel(col.hueFamily) }}</p>
        <div class="hue-row__ramp">
          @for (hex of col.shades; track hex) {
            <button
              type="button"
              class="swatch"
              [class.swatch--active]="isActive(hex)"
              [attr.data-hex]="hex"
              [attr.aria-pressed]="isActive(hex)"
              [attr.title]="hex"
              [attr.aria-label]="'Select color ' + hex"
              [style.background-color]="hex"
              (click)="pick(hex)"
            ></button>
          }
        </div>
      </div>
    }
  </div>
</div>

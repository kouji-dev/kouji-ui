<a [routerLink]="link()" class="track-card">
  @if (eyebrow() || count() != null) {
    <header class="track-card-header">
      @if (eyebrow()) {
        <code class="track-card-pkg">{{ eyebrow() }}</code>
      } @else { <span></span> }

      @if (count() != null) {
        <span class="track-card-count">{{ count() }}</span>
      }
    </header>
  }

  <h2 class="track-card-title">{{ title() }}</h2>

  @if (description()) {
    <p class="track-card-tagline">{{ description() }}</p>
  }

  @if (cta()) {
    <footer class="track-card-footer">
      <span class="track-card-cta">
        {{ cta() }}
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </span>
    </footer>
  }
</a>

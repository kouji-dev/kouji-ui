name: Deploy Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'angular.json'
      - 'packages/core/src/**'
      - '.github/workflows/deploy-docs.yml'

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Trigger Render deploy and wait
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          echo "Triggering deploy for service $RENDER_SERVICE_ID"
          deploy_response=$(curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")

          deploy_id=$(echo "$deploy_response" | jq -r '.id')
          if [ -z "$deploy_id" ] || [ "$deploy_id" = "null" ]; then
            echo "Failed to extract deploy id from response:"
            echo "$deploy_response"
            exit 1
          fi
          echo "Deploy triggered: $deploy_id"

          terminal_success="live"
          terminal_failures="build_failed update_failed pre_deploy_failed canceled deactivated"

          while true; do
            sleep 15
            status_response=$(curl --fail --silent --show-error \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$deploy_id")
            status=$(echo "$status_response" | jq -r '.status')
            echo "Deploy status: $status"

            if [ "$status" = "$terminal_success" ]; then
              echo "Deploy succeeded."
              exit 0
            fi

            for failure in $terminal_failures; do
              if [ "$status" = "$failure" ]; then
                echo "Deploy ended in terminal failure state: $status"
                echo "$status_response" | jq .
                exit 1
              fi
            done
          done

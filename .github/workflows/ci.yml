name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      # Tree-shaking guard: publishable packages must keep a correct
      # `sideEffects` declaration so bundlers can drop unused exports.
      - name: Tree-shaking / side-effects guard
        run: pnpm sideeffects:check

      # Per-component bundle budgets: fail on a gzipped-size regression.
      # Runs against the dist/ produced by the Build step above.
      - name: Bundle budgets
        run: pnpm size

      # NOTE: Test + E2E temporarily disabled — being fixed in a separate scope.
      # - name: Install Playwright browsers
      #   run: pnpm exec playwright install --with-deps chromium
      # - name: Test
      #   run: pnpm test
      # - name: E2E
      #   run: pnpm test:e2e

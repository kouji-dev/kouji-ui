name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.repository_owner != '' && !github.event.repository.fork

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

  deploy-docs:
    needs: release
    if: needs.release.outputs.published == 'true' && contains(needs.release.outputs.publishedPackages, '@kouji-ui/core')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Trigger Render deploy and wait
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          echo "Triggering deploy for service $RENDER_SERVICE_ID"
          deploy_response=$(curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")

          deploy_id=$(echo "$deploy_response" | jq -r '.id')
          if [ -z "$deploy_id" ] || [ "$deploy_id" = "null" ]; then
            echo "Failed to extract deploy id from response:"
            echo "$deploy_response"
            exit 1
          fi
          echo "Deploy triggered: $deploy_id"

          terminal_success="live"
          terminal_failures="build_failed update_failed pre_deploy_failed canceled deactivated"

          while true; do
            sleep 15
            status_response=$(curl --fail --silent --show-error \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$deploy_id")
            status=$(echo "$status_response" | jq -r '.status')
            echo "Deploy status: $status"

            if [ "$status" = "$terminal_success" ]; then
              echo "Deploy succeeded."
              exit 0
            fi

            for failure in $terminal_failures; do
              if [ "$status" = "$failure" ]; then
                echo "Deploy ended in terminal failure state: $status"
                echo "$status_response" | jq .
                exit 1
              fi
            done
          done
